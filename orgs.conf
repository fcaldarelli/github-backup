# =============================================================================
# orgs.conf — GitHub organization configuration for github_backup.sh
#
# Syntax:
#   org-name                     → all repositories in the organization
#   org-name: *                  → all repositories (explicit, equivalent)
#   org-name: repo-a, repo-b     → only the specified repositories
#
# - Comments start with #
# - Whitespace around ":" and "," is ignored
# - Empty lines are ignored
# =============================================================================

# Example: all repos from this org
# all-repo-org

# Example: only specific repos
# my-other-org: backend-api, frontend-app, shared-libs

# Example: explicit wildcard (equivalent to no filter after ":")
# open-source-org: *

# Example: single repo
# client-org: main-project
